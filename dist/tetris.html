<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="keywords" content="javascript,canvas,game,engine,scheduler,command queue,replay,ai,tetris" />
    <meta
      name="description"
      content="tetris.js 是一款零依赖的原生 JavaScript 俄罗斯方块游戏，基于 Canvas 实现，支持多端输入与 AI 控制。项目采用固定帧流程驱动架构，结合 Scheduler、Command Queue 与 Replay 系统，实现清晰的游戏更新管线，是一个轻量级前端游戏引擎设计与架构实践示例。"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" href="css/tetris.css" as="style" />
    <link rel="preload" href="js/tetris.js" as="script" />
    <link rel="preload" href="img/bg.jpg" as="image" />
    <link rel="prefetch" href="font/latin.woff2" type="font/woff2" as="font" />
    <title>俄罗斯方块</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link href="css/tetris.css" rel="stylesheet" />
  </head>
  <body>
    <div class="tetris-container" data-mode="versus">
      <section id="tetris-battle-overlay" class="tetris-battle-overlay tetris-hidden">
        <h2 class="tetris-battle-title">BATTILE OVER</h2>
        <div class="tetris-battle-winner">WINNER IS <span id="tetris-battle-winner" class="tetris-highlight">HUMAN</span></div>
        <footer class="tetris-battle-actions">
          <div id="tetris-battle-rematch">ENTER TO REMATCH</div>
        </footer>
      </section>

      <div id="human-0-tetris-player" class="tetris-player">
        <section class="tetris-screen">
          <section id="human-0-tetris-screen-main" class="tetris-screen-main">
            <canvas id="human-0-tetris-game-board" data-mode="main-menu"></canvas>
          </section>
          <aside class="tetris-screen-aside">
            <section class="tetris-panel next">
              <h3 class="tetris-next-title">NEXT</h3>
              <canvas id="human-0-tetris-next-piece" class="tetris-next-piece"></canvas>
            </section>
            <section class="tetris-panel controller">
              <p class="tetris-panel-text tetris-highlight"><span id="human-0-tetris-controller">Human</span></p>
            </section>
            <section class="tetris-panel data">
              <p class="tetris-panel-text">SCORE:<br /><span id="human-0-tetris-score">00000</span></p>
              <p class="tetris-panel-text">LINE:<br /><span id="human-0-tetris-lines">00</span></p>
              <p class="tetris-panel-text">LEVEL:<br /><span id="human-0-tetris-level">01</span></p>
              <p class="tetris-panel-text">COMBO:<br /><span id="human-0-tetris-combo">00</span></p>
              <p class="tetris-panel-text tetris-highlight">HI-SCORE:<br /><span id="human-0-tetris-high-score">00000</span></p>
            </section>
            <section class="tetris-panel hold">
              <h3 class="tetris-hold-title">HOLD</h3>
              <canvas id="human-0-tetri-hold-piece" class="tetris-hold-piece"></canvas>
            </section>
          </aside>
        </section>
        <footer class="tetris-controls">
          <!-- START / SELECT -->
          <section class="tetris-system-controls">
            <div id="human-0-tetris-btn-back" data-key="back" class="tetris-system-button tetris-btn-back">BACK</div>
            <div id="human-0-tetris-btn-hold" data-key="hold" class="tetris-system-button tetris-btn-hold">HOLD</div>
            <div id="human-0-tetris-btn-start" data-key="start" class="tetris-system-button tetris-btn-start">START</div>
          </section>
          <section class="tetris-main-controls">
            <!-- D-PAD -->
            <div class="tetris-dpad">
              <div id="human-0-tetris-dpad-up" data-key="dpad_up" class="tetris-dpad-up">↑</div>
              <div class="tetris-dpad-mid">
                <div id="human-0-tetris-dpad-left" data-key="dpad_left" class="tetris-dpad-left">←</div>
                <div class="tetris-dpad-center"></div>
                <div id="human-0-tetris-dpad-right" data-key="dpad_right" class="tetris-dpad-right">→</div>
              </div>
              <div id="human-0-tetris-dpad-down" data-key="dpad_down" class="tetris-dpad-down">↓</div>
            </div>
            <!-- BUTTONS -->
            <div class="tetris-buttons">
              <div id="human-0-tetris-btn-x" data-key="x" class="tetris-action-button tetris-button-x">X</div>
              <div id="human-0-tetris-btn-y" data-key="y" class="tetris-action-button tetris-button-y">Y</div>
              <div id="human-0-tetris-btn-b" data-key="b" class="tetris-action-button tetris-button-b">B</div>
              <div id="human-0-tetris-btn-a" data-key="a" class="tetris-action-button tetris-button-a">A</div>
            </div>
          </section>
        </footer>
      </div>

      <div class="tetris-battle-score">
        <h3 class="tetris-battle-player">1P</h3>
        <span id="human-0-tetris-battle-score">0</span>
      </div>

      <div id="ai-1-tetris-player" class="tetris-player">
        <section class="tetris-screen">
          <section id="ai-1-tetris-screen-main" class="tetris-screen-main">
            <canvas id="ai-1-tetris-game-board" data-mode="main-menu"></canvas>
          </section>
          <aside class="tetris-screen-aside">
            <section class="tetris-panel next">
              <h3 class="tetris-next-title">NEXT</h3>
              <canvas id="ai-1-tetris-next-piece" class="tetris-next-piece"></canvas>
            </section>
            <section class="tetris-panel controller">
              <p class="tetris-panel-text tetris-highlight"><span id="ai-1-tetris-controller">Human</span></p>
            </section>
            <section class="tetris-panel data">
              <p class="tetris-panel-text">SCORE:<br /><span id="ai-1-tetris-score">00000</span></p>
              <p class="tetris-panel-text">LINE:<br /><span id="ai-1-tetris-lines">00</span></p>
              <p class="tetris-panel-text">LEVEL:<br /><span id="ai-1-tetris-level">01</span></p>
              <p class="tetris-panel-text">COMBO:<br /><span id="ai-1-tetris-combo">00</span></p>
              <p class="tetris-panel-text tetris-highlight">HI-SCORE:<br /><span id="ai-1-tetris-high-score">00000</span></p>
            </section>
            <section class="tetris-panel hold">
              <h3 class="tetris-hold-title">HOLD</h3>
              <canvas id="ai-1-tetri-hold-piece" class="tetris-hold-piece"></canvas>
            </section>
          </aside>
        </section>
        <footer class="tetris-controls">
          <!-- START / SELECT -->
          <section class="tetris-system-controls">
            <div id="ai-1-tetris-btn-back" data-key="back" class="tetris-system-button tetris-btn-back">BACK</div>
            <div id="ai-1-tetris-btn-hold" data-key="hold" class="tetris-system-button tetris-btn-hold">HOLD</div>
            <div id="ai-1-tetris-btn-start" data-key="start" class="tetris-system-button tetris-btn-start">START</div>
          </section>
          <section class="tetris-main-controls">
            <!-- D-PAD -->
            <div class="tetris-dpad">
              <div id="ai-1-tetris-dpad-up" data-key="dpad_up" class="tetris-dpad-up">↑</div>
              <div class="tetris-dpad-mid">
                <div id="ai-1-tetris-dpad-left" data-key="dpad_left" class="tetris-dpad-left">←</div>
                <div class="tetris-dpad-center"></div>
                <div id="ai-1-tetris-dpad-right" data-key="dpad_right" class="tetris-dpad-right">→</div>
              </div>
              <div id="ai-1-tetris-dpad-down" data-key="dpad_down" class="tetris-dpad-down">↓</div>
            </div>
            <!-- BUTTONS -->
            <div class="tetris-buttons">
              <div id="ai-1-tetris-btn-x" data-key="x" class="tetris-action-button tetris-button-x">X</div>
              <div id="ai-1-tetris-btn-y" data-key="y" class="tetris-action-button tetris-button-y">Y</div>
              <div id="ai-1-tetris-btn-b" data-key="b" class="tetris-action-button tetris-button-b">B</div>
              <div id="ai-1-tetris-btn-a" data-key="a" class="tetris-action-button tetris-button-a">A</div>
            </div>
          </section>
        </footer>
      </div>

      <div class="tetris-battle-score">
        <h3 class="tetris-battle-player">2P</h3>
        <span id="ai-1-tetris-battle-score">0</span>
      </div>
    </div>
    <script src="js/tetris.js"></script>
  </body>
</html>
